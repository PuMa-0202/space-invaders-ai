<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Space Invaders - Single File Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            border: 2px solid #333;
        }

        canvas {
            display: block;
            background-color: #000;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            font-size: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 5px currentColor;
        }

        .hud-bottom {
            padding: 10px;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 2px solid #0f0;
            display: none;
        }

        h1 { margin: 0 0 20px 0; color: #0f0; font-size: 40px; letter-spacing: 5px; }
        p { margin: 10px 0; font-size: 18px; }
        .blink { animation: blinker 1s linear infinite; }

        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div id="scoreDisplay">SCORE: 0</div>
            <div id="highScoreDisplay" style="color: #ff00ff">HI-SCORE: 0</div>
        </div>
        <div class="hud-bottom">
            LIVES: <span id="livesDisplay" style="color: #0f0">❤❤❤</span> | LEVEL: <span id="levelDisplay">1</span>
        </div>
    </div>

    <div id="start-screen" style="display: block;">
        <h1>SPACE INVADERS</h1>
        <p>ARROWS / A-D to Move</p>
        <p>SPACE to Shoot</p>
        <p class="blink" style="margin-top: 20px; color: yellow;">PRESS ENTER TO START</p>
    </div>

    <div id="game-over-screen">
        <h1 style="color: red;">GAME OVER</h1>
        <p id="finalScore">SCORE: 0</p>
        <p class="blink" style="margin-top: 20px;">PRESS ENTER TO RESTART</p>
    </div>
</div>

<script>
/**
 * AUDIO SYSTEM (Synthesizer)
 * Uses Web Audio API to generate sounds without external files.
 */
const AudioSys = {
    ctx: null,
    
    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },

    playTone(freq, type, duration, vol = 0.1) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);

        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },

    playShoot() {
        // High pitch decay
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.2);
    },

    playExplosion() {
        // Noise simulation using low freq oscillation
        this.playTone(100, 'sawtooth', 0.3, 0.1);
        this.playTone(50, 'square', 0.4, 0.1);
    },

    playAlienKill() {
        this.playTone(200, 'square', 0.1, 0.05);
    }
};

/**
 * GAME ENGINE & LOGIC
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game State
const STATE = {
    MENU: 0,
    PLAYING: 1,
    GAMEOVER: 2
};

let currentState = STATE.MENU;
let animationId;
let lastTime = 0;

// Inputs
const keys = {
    ArrowLeft: false, ArrowRight: false,
    KeyA: false, KeyD: false,
    Space: false,
    Enter: false
};

// Game Objects
const player = {
    x: canvas.width / 2,
    y: canvas.height - 50,
    width: 40,
    height: 20,
    speed: 5,
    color: '#0f0',
    lives: 3,
    dead: false,
    respawnTimer: 0
};

let aliens = [];
let bullets = [];
let particles = [];
let stars = [];

// Settings
const ALIEN_ROWS = 5;
const ALIEN_COLS = 10;
const ALIEN_WIDTH = 30;
const ALIEN_HEIGHT = 20;
const ALIEN_PADDING = 15;
const ALIEN_COLORS = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff']; // Different colors per row

let score = 0;
let highScore = localStorage.getItem('spaceInvadersHighScore') || 0;
let level = 1;
let alienDirection = 1; // 1 right, -1 left
let alienMoveTimer = 0;
let alienBaseSpeed = 500; // ms per move
let currentAlienSpeed = 500;
let alienDropDistance = 20;

// Screen Shake
let shakeIntensity = 0;
let shakeDuration = 0;

// --- INITIALIZATION ---

function initStars() {
    stars = [];
    for(let i=0; i<100; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 0.5 + 0.1
        });
    }
}

function initAliens() {
    aliens = [];
    const startX = (canvas.width - (ALIEN_COLS * (ALIEN_WIDTH + ALIEN_PADDING))) / 2;
    const startY = 50;

    for (let row = 0; row < ALIEN_ROWS; row++) {
        for (let col = 0; col < ALIEN_COLS; col++) {
            aliens.push({
                x: startX + col * (ALIEN_WIDTH + ALIEN_PADDING),
                y: startY + row * (ALIEN_HEIGHT + ALIEN_PADDING),
                row: row,
                width: ALIEN_WIDTH,
                height: ALIEN_HEIGHT,
                color: ALIEN_COLORS[row % ALIEN_COLORS.length],
                active: true
            });
        }
    }
    // Speed increases with level
    alienBaseSpeed = Math.max(100, 600 - (level * 50));
    currentAlienSpeed = alienBaseSpeed;
}

function resetGame() {
    score = 0;
    level = 1;
    player.lives = 3;
    player.dead = false;
    player.x = canvas.width / 2 - player.width / 2;
    bullets = [];
    particles = [];
    initAliens();
    updateUI();
    currentState = STATE.PLAYING;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over-screen').style.display = 'none';
    AudioSys.init(); // Initialize audio context on first user gesture
}

function nextLevel() {
    level++;
    bullets = [];
    initAliens();
    updateUI();
    // Bonus for clearing level
    score += 1000;
    // Small life bonus
    if (player.lives < 5) player.lives++;
    AudioSys.playTone(600, 'sine', 0.5);
}

// --- INPUT HANDLING ---

window.addEventListener('keydown', (e) => {
    if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
    
    if (e.code === 'Space' && currentState === STATE.PLAYING && !player.dead) {
        playerShoot();
    }
    
    if (e.code === 'Enter') {
        if (currentState === STATE.MENU || currentState === STATE.GAMEOVER) {
            resetGame();
        }
    }
});

window.addEventListener('keyup', (e) => {
    if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
});

// --- LOGIC ---

function playerShoot() {
    // Limit bullets
    const playerBullets = bullets.filter(b => b.dy < 0);
    if (playerBullets.length >= 3) return;

    bullets.push({
        x: player.x + player.width / 2 - 2,
        y: player.y,
        width: 4,
        height: 10,
        dy: -7,
        color: '#ff0',
        type: 'player'
    });
    AudioSys.playShoot();
}

function alienShoot() {
    // Random alien shoots
    const activeAliens = aliens.filter(a => a.active);
    if (activeAliens.length === 0) return;

    const shooter = activeAliens[Math.floor(Math.random() * activeAliens.length)];
    bullets.push({
        x: shooter.x + shooter.width / 2,
        y: shooter.y + shooter.height,
        width: 4,
        height: 10,
        dy: 4 + (level * 0.5), // Aliens shoot faster per level
        color: '#f00',
        type: 'enemy'
    });
}

function createExplosion(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            life: 1.0,
            color: color,
            size: Math.random() * 3 + 1
        });
    }
}

function triggerShake(intensity, duration) {
    shakeIntensity = intensity;
    shakeDuration = duration;
}

function checkCollision(rect1, rect2) {
    return (rect1.x < rect2.x + rect2.width &&
            rect1.x + rect1.width > rect2.x &&
            rect1.y < rect2.y + rect2.height &&
            rect1.y + rect1.height > rect2.y);
}

function update(dt) {
    if (currentState !== STATE.PLAYING) return;

    // Player Movement
    if (!player.dead) {
        if (keys.ArrowLeft || keys.KeyA) player.x -= player.speed;
        if (keys.ArrowRight || keys.KeyD) player.x += player.speed;
        // Clamp
        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
    } else {
        // Respawn logic
        player.respawnTimer -= dt;
        if (player.respawnTimer <= 0) {
            player.dead = false;
            player.x = canvas.width / 2 - player.width / 2;
            // Invincibility or safe start could go here
        }
    }

    // Alien Movement Logic
    const activeAliens = aliens.filter(a => a.active);
    
    // Level clear?
    if (activeAliens.length === 0) {
        nextLevel();
        return;
    }

    // Dynamic speed based on remaining aliens (fewer aliens = faster)
    const speedRatio = activeAliens.length / (ALIEN_ROWS * ALIEN_COLS);
    const speedMultiplier = 0.2 + (0.8 * speedRatio); // Max speedup
    const actualSpeed = currentAlienSpeed * speedMultiplier;

    alienMoveTimer += dt;
    if (alienMoveTimer > actualSpeed) {
        alienMoveTimer = 0;
        let hitEdge = false;

        // Check edges
        activeAliens.forEach(a => {
            if ((a.x <= 0 && alienDirection === -1) || 
                (a.x + a.width >= canvas.width && alienDirection === 1)) {
                hitEdge = true;
            }
        });

        if (hitEdge) {
            alienDirection *= -1;
            activeAliens.forEach(a => a.y += alienDropDistance);
        } else {
            activeAliens.forEach(a => a.x += 10 * alienDirection);
        }
        
        // Random alien shot chance increases as they speed up
        if (Math.random() < 0.05 + (0.1 * (1 - speedRatio))) {
            alienShoot();
        }
    }

    // Check Game Over (Aliens reach bottom)
    activeAliens.forEach(a => {
        if (a.y + a.height >= player.y) {
            gameOver();
        }
    });

    // Bullets
    bullets.forEach((b, index) => {
        b.y += b.dy;
        
        // Remove offscreen
        if (b.y < 0 || b.y > canvas.height) {
            b.active = false;
            return;
        }

        // Collisions
        if (b.type === 'player') {
            aliens.forEach(a => {
                if (a.active && checkCollision(b, a)) {
                    a.active = false;
                    b.active = false;
                    score += (5 - a.row) * 10; // More points for top rows
                    createExplosion(a.x + a.width/2, a.y + a.height/2, a.color);
                    AudioSys.playAlienKill();
                }
            });
        } else if (b.type === 'enemy') {
            if (!player.dead && checkCollision(b, player)) {
                b.active = false;
                killPlayer();
            }
        }
    });
    
    // Cleanup bullets
    bullets = bullets.filter(b => b.active !== false);

    // Particles
    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
    });
    particles = particles.filter(p => p.life > 0);

    // Screen Shake Decay
    if (shakeDuration > 0) {
        shakeDuration--;
    } else {
        shakeIntensity = 0;
    }

    updateUI();
}

function killPlayer() {
    player.lives--;
    player.dead = true;
    player.respawnTimer = 2000; // 2 seconds
    createExplosion(player.x + player.width/2, player.y + player.height/2, '#0f0', 30);
    triggerShake(10, 20); // Intensity 10, Duration 20 frames
    AudioSys.playExplosion();
    
    if (player.lives <= 0) {
        gameOver();
    }
}

function gameOver() {
    currentState = STATE.GAMEOVER;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('spaceInvadersHighScore', highScore);
    }
    document.getElementById('finalScore').textContent = "SCORE: " + score;
    document.getElementById('game-over-screen').style.display = 'block';
}

function updateUI() {
    document.getElementById('scoreDisplay').textContent = "SCORE: " + score;
    document.getElementById('highScoreDisplay').textContent = "HI-SCORE: " + highScore;
    document.getElementById('levelDisplay').textContent = level;
    
    let hearts = "";
    for(let i=0; i<Math.max(0, player.lives); i++) hearts += "❤";
    document.getElementById('livesDisplay').textContent = hearts;
}

// --- DRAWING ---

function draw() {
    // Clear with semi-black for trail effect? No, clean clear for retro style
    ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset transform
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Apply Shake
    if (shakeIntensity > 0) {
        const dx = (Math.random() - 0.5) * shakeIntensity;
        const dy = (Math.random() - 0.5) * shakeIntensity;
        ctx.translate(dx, dy);
    }

    // Stars
    ctx.fillStyle = '#fff';
    stars.forEach(s => {
        ctx.globalAlpha = Math.random() * 0.5 + 0.5;
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.y += s.speed;
        if(s.y > canvas.height) s.y = 0;
    });
    ctx.globalAlpha = 1;

    if (currentState === STATE.PLAYING) {
        // Draw Player
        if (!player.dead || Math.floor(Date.now() / 100) % 2 === 0) { // Blink if respawning but invisible
            if (!player.dead) {
                ctx.fillStyle = player.color;
                // Simple ship shape
                ctx.beginPath();
                ctx.moveTo(player.x + player.width/2, player.y);
                ctx.lineTo(player.x + player.width, player.y + player.height);
                ctx.lineTo(player.x, player.y + player.height);
                ctx.fill();
            }
        }

        // Draw Aliens
        aliens.forEach(a => {
            if (a.active) {
                ctx.fillStyle = a.color;
                // Simple invader block with "eyes"
                ctx.fillRect(a.x, a.y, a.width, a.height);
                // Eyes
                ctx.fillStyle = '#000';
                ctx.fillRect(a.x + 5, a.y + 5, 5, 5);
                ctx.fillRect(a.x + a.width - 10, a.y + 5, 5, 5);
            }
        });

        // Draw Bullets
        bullets.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, b.width, b.height);
        });

        // Draw Particles
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        ctx.globalAlpha = 1;
    }
}

// --- MAIN LOOP ---

function gameLoop(timestamp) {
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    update(dt);
    draw();

    animationId = requestAnimationFrame(gameLoop);
}

// Start
initStars();
initAliens();
updateUI();
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
